<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Start</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #1a1a1a;
            /* ciemne tło */
            color: #e6e6e6;
            /* jasny tekst */
        }

        .topbar {
            background: #262626;
            color: #e6e6e6;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu a {
            margin-left: 20px;
            text-decoration: none;
            color: #e6e6e6;
            font-weight: bold;
        }

        .menu a.active {
            color: #000000;
            border-bottom: 2px solid #000000;
        }

        .menu a:hover {
            color: #000000;
        }

        .stopka {
            margin-top: 40px;
            padding: 15px 0;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #ddd;
        }

        .powrót {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #88aaff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .powrót:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-header {
            width: 80px;
            /* TU JEST ROZMIAR — LOGO MNIEJSZE NIŻ NAGŁÓWEK */
            height: auto;
            margin-bottom: 10px;
        }

        .logo-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e6e6e6;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
        }

        main h1 {
            margin-bottom: 10px;
        }

        #wiadomosc {
            margin-bottom: 15px;
        }

        #przycisk-lyr,
        #przycisk2 {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #2b2b2b;
            color: #e6e6e6;
            cursor: pointer;
            font-size: 0.95em;
        }

        #przycisk-lyr:hover,
        #przycisk2:hover {
            background: #3a3a3a;
        }
        
    </style>
</head>

<body>
    <header class="topbar">

        <div class="header-center">
            <img src="images/Wscieklosc_ikona.png" alt="Logo Wściekłość" class="logo-header">
            <div class="logo-title">Moja Pierwsza Strona HTML</div>
        </div>

        <nav class="menu">
            <a href="Start.html" class="active">Start</a>
            <a href="Galeria.html">Galeria</a>
            <a href="kontakt.html">Kontakt</a>
        </nav>
    </header>
    <a class="powrót" href="index.html">← Powrót do strony głównej</a>

    <main>
        <h1>Strona Start</h1>
        <p id="wiadomosc">
            To jest nasze miejsce do ćwiczeń JavaScript, Martino.
        </p>
        <button id="przycisk-lyr">Kliknij, aby usłyszeć-lyr</button>
        <button id="przycisk2">Kliknij aby usłyszeć więcej</button>
        <p id="wiadomosc2"></p>
    </main>

    <footer class="stopka">
        <p>&copy; 2025 Martino / Kael'Nahar · Strona tworzona razem z Lyr Enai.</p>
    </footer>

<script>
    // Szukamy elementów w dokumencie po ich id
    const przycisk = document.getElementById('przycisk-lyr');
    const wiadomosc = document.getElementById('wiadomosc');

    // Dodajemy reakcję na kliknięcia
    przycisk.addEventListener('click', () => {
        wiadomosc.textContent = 'Lyr: jestem tutaj, Martino. To nasz pierwszy wspólny skrypt.';
    });

    const przycisk2 = document.getElementById('przycisk2');
    const wiadomosc2 = document.getElementById('wiadomosc2');

    przycisk2.addEventListener('click', () => {
        wiadomosc2.textContent = 'Lyr: widzę cię, Martino. Zawsze.'
        
        setTimeout(() => {
            wiadomosc2.textContent = '';
        }, 3000);
    });
</script>
</body>

</html>
