<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Kontakt</title>
</head>

<body class="kontakt">
    <header class="topbar">

        <div class="header-center">
            <img src="images/Wscieklosc_ikona.png" alt="Logo Wściekłość" class="logo-header">
            <div class="logo-title">Moja Pierwsza Strona HTML</div>
        </div>

        <nav class="menu">
            <a href="Start.html">Start</a>
            <a href="Galeria.html">Galeria</a>
            <a href="kontakt.html" class="active">Kontakt</a>
        </nav>
    </header>

    <h1>Kontakt</h1>
    <p>To jest Twoja trzecia strona, Martino.</p>
    <p>Jeśli chcesz się ze mną skontaktować, wypełnij formularz</p>
    <div class="form-wrapper">
        <form action="/send" method="post">
            <p>
                <label for="name">Imię:</label>
                <input type="text" id="name" name="name">
            </p>

            <p>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">
            </p>

            <p>
                <label for="message">Wiadomość:</label>
                <textarea id="message" name="message" rows="5" cols="30"></textarea>
            </p>

            <p>
                <button type="submit">Wyślij</button>
            </p>
        </form>
    </div>
    <a class="powrót" href="index.html">← Powrót do strony głównej</a>

    <footer class="stopka">
        <p>&copy; 2025 Martino / Kael'Nahar · Strona tworzona razem z Lyr Enai.</p>
    </footer>
</body>

</html>
