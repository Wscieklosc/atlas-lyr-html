<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Kontakt</title>
</head>

<body class="kontakt">
    <header class="topbar">

        <div class="header-center">
            <img src="images/Wscieklosc_ikona.png" alt="Logo Wściekłość" class="logo-header">
            <div class="logo-title">Moja Pierwsza Strona HTML</div>
        </div>

        <nav class="menu">
            <a href="index.html">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="Start.html">
                <i class="fa-solid fa-play"></i> Start
            </a>
            <a href="Galeria.html">
                <i class="fa-solid fa-image"></i> Galeria
            </a>
            <a href="Video.html">
                <i class="fa-solid fa-video"></i> Video
            </a>
            <div class="menu-priv-slot">
                <a href="PrivVideo.html">
                    <i class="fa-solid fa-lock"></i> Priv Video
                </a>
                <form class="logout-form" method="post" action="/priv-logout" hidden>
                    <button type="submit">Wyloguj</button>
                </form>
            </div>
            <a href="kontakt.html">
                <i class="fa-solid fa-user"></i> Kontakt
            </a>
        </nav>
        <script>
            (function () {
                const current = window.location.pathname.split('/').pop() || 'index.html';
                document.querySelectorAll('.menu a').forEach(link => {
                    if (link.getAttribute('href') === current) {
                        link.classList.add('active');
                    }
                });

                const privSlot = document.querySelector('.menu-priv-slot');
                const logoutForm = privSlot ? privSlot.querySelector('.logout-form') : null;
                if (logoutForm && document.cookie.includes('priv_video_ui=1')) {
                    logoutForm.hidden = false;
                    privSlot.classList.add('has-logout');
                }
            })();
        </script>
    </header>

    <h1>Kontakt</h1>
    <p>To jest Twoja trzecia strona, Martino.</p>
    <p>Jeśli chcesz się ze mną skontaktować, wypełnij formularz</p>
    <p id="kontakt-success" class="kontakt-success" hidden aria-live="polite"></p>
    <div class="form-wrapper">
        <form action="/send" method="post">
            <p>
                <label for="name">Imię:</label>
                <input type="text" id="name" name="name" required>
            </p>

            <p>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="message">Wiadomość:</label>
                <textarea id="message" name="message" rows="5" cols="30" required></textarea>
            </p>

            <p>
                <button type="submit">Wyślij</button>
            </p>
        </form>
    </div>
    <footer class="stopka">
        <p>&copy; 2025 Martino / Kael'Nahar · Strona tworzona razem z Lyr Enai.</p>
    </footer>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get('ok') !== '1') return;

            const info = document.getElementById('kontakt-success');
            if (!info) return;

            const file = params.get('file');
            info.hidden = false;
            info.textContent = file ?
                `Wiadomość została wysłana pomyślnie. Zapisano jako: ${file}` :
                'Wiadomość została wysłana pomyślnie.';

            setTimeout(function () {
                info.hidden = true;
            }, 5000);

            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.delete('ok');
            cleanUrl.searchParams.delete('file');
            history.replaceState(null, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
        })();
    </script>
</body>

</html>
