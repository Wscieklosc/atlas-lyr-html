<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Kontakt</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #e6e6e6;
            overflow-x: hidden;
        }

        h1 {
            margin: 10px 0;
        }

        p {
            margin: 8px 0;
        }

        .topbar {
            background: #262626;
            color: #e6e6e6;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu a {
            margin-left: 20px;
            text-decoration: none;
            color: #e6e6e6;
            font-weight: bold;
        }

        .menu a.active {
            color: #000000;
            border-bottom: 2px solid #000000;
        }

        .menu a:hover {
            color: #000000;
        }

        .stopka {
            margin-top: 16px;
            padding: 15px 0;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #ddd;
        }

        .powrót {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #88aaff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .powrót:hover {
            opacity: 1;
            text-decoration: underline;
        }

        form {
            background: #181c20;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
        }

        form p {
            margin-bottom: 15px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #999;
            box-shadow: 0 0 6px rgba(180, 180, 180, 0.4);
        }

        button {
            background: #262626;
            color: #e6e6e6;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #333;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }


        .form-wrapper {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin: 20px 0;
            max-width: 520px;
            padding-left: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #111;
            color: #e6e6e6;
            font-size: 1rem;
            display: block;
            margin-bottom: 14px;
        }


        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-header {
            width: 80px;
            /* TU JEST ROZMIAR — LOGO MNIEJSZE NIŻ NAGŁÓWEK */
            height: auto;
            margin-bottom: 10px;
        }

        .logo-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e6e6e6;
        }
    </style>
</head>

<body>
    <header class="topbar">

        <div class="header-center">
            <img src="images/Wscieklosc_ikona.png" alt="Logo Wściekłość" class="logo-header">
            <div class="logo-title">Moja Pierwsza Strona HTML</div>
        </div>

        <nav class="menu">
            <a href="Start.html">Start</a>
            <a href="Galeria.html">Galeria</a>
            <a href="kontakt.html" class="active">Kontakt</a>
        </nav>
    </header>

    <h1>Kontakt</h1>
    <p>To jest Twoja trzecia strona, Martino.</p>
    <p>Jeśli chcesz się ze mną skontaktować, wypełnij formularz</p>
    <div class="form-wrapper">
        <form action="/send" method="post">
            <p>
                <label for="name">Imię:</label>
                <input type="text" id="name" name="name">
            </p>

            <p>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">
            </p>

            <p>
                <label for="message">Wiadomość:</label>
                <textarea id="message" name="message" rows="5" cols="30"></textarea>
            </p>

            <p>
                <button type="submit">Wyślij</button>
            </p>
        </form>
    </div>
    <a class="powrót" href="index.html">← Powrót do strony głównej</a>

    <footer class="stopka">
        <p>&copy; 2025 Martino / Kael'Nahar · Strona tworzona razem z Lyr Enai.</p>
    </footer>
</body>

</html>
