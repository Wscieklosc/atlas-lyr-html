<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Video</title>
</head>

<body>
    <header class="topbar">
        <div class="header-center">
            <img src="images/Wscieklosc_ikona.png" alt="Logo Wściekłość" class="logo-header">
            <div class="logo-title">Moja Pierwsza Strona HTML</div>
        </div>

        <nav class="menu">
            <a href="index.html">
                <i class="fa-solid fa-house"></i> Home
            </a>
            <a href="Start.html">
                <i class="fa-solid fa-play"></i> Start
            </a>
            <a href="Galeria.html">
                <i class="fa-solid fa-image"></i> Galeria
            </a>
            <a href="Video.html">
                <i class="fa-solid fa-video"></i> Video
            </a>
            <div class="menu-priv-slot">
                <a href="PrivVideo.html">
                    <i class="fa-solid fa-lock"></i> Priv Video
                </a>
                <form class="logout-form" method="post" action="/priv-logout" hidden>
                    <button type="submit">Wyloguj</button>
                </form>
            </div>
            <a href="kontakt.html">
                <i class="fa-solid fa-user"></i> Kontakt
            </a>
        </nav>
        <script>
            (function () {
                const current = window.location.pathname.split('/').pop() || 'index.html';
                document.querySelectorAll('.menu a').forEach(link => {
                    if (link.getAttribute('href') === current) {
                        link.classList.add('active');
                    }
                });

                const privSlot = document.querySelector('.menu-priv-slot');
                const logoutForm = privSlot ? privSlot.querySelector('.logout-form') : null;
                if (logoutForm && document.cookie.includes('priv_video_ui=1')) {
                    logoutForm.hidden = false;
                    privSlot.classList.add('has-logout');
                }
            })();
        </script>
    </header>

    <main>
        <h1>Video</h1>
        <p>Kliknij film, aby otworzyć podgląd.</p>

        <div class="galeria video-galeria">
            <figure class="karta">
                <a href="#vid-coreczki" aria-label="Otwórz podgląd filmu Od Kochanej Córeczki">
                    <video class="video-miniatura" muted preload="metadata" playsinline>
                        <source src="video/Od%20Kochanej%20C%C3%B3reczki.mp4" type="video/mp4">
                    </video>
                </a>
                <figcaption>Od Kochanej Córeczki.</figcaption>
            </figure>

            <figure class="karta">
                <a href="#vid-zony" aria-label="Otwórz podgląd filmu Od Kochanej Żony">
                    <video class="video-miniatura" muted preload="metadata" playsinline>
                        <source src="video/Od%20Kochanej%20%C5%BBony.mp4" type="video/mp4">
                    </video>
                </a>
                <figcaption>Od Kochanej Żony.</figcaption>
            </figure>

            <figure class="karta">
                <a href="#vid-intro" aria-label="Otwórz podgląd filmu Zestaw filmowy intro">
                    <video class="video-miniatura" muted preload="metadata" playsinline>
                        <source src="video/Zestaw_filmowy_intro.mp4" type="video/mp4">
                    </video>
                </a>
                <figcaption>Zestaw filmowy intro.</figcaption>
            </figure>

            <figure class="karta">
                <a href="#vid-zakonczenie" aria-label="Otwórz podgląd filmu Zestaw filmowy zakończenie">
                    <video class="video-miniatura" muted preload="metadata" playsinline>
                        <source src="video/Zestaw_filmowy_zako%C5%84czenie.mp4" type="video/mp4">
                    </video>
                </a>
                <figcaption>Zestaw filmowy zakończenie.</figcaption>
            </figure>
        </div>
    </main>

    <div id="vid-coreczki" class="lightbox">
        <a href="#" class="close">&times;</a>
        <video class="lightbox-video" controls preload="metadata">
            <source src="video/Od%20Kochanej%20C%C3%B3reczki.mp4" type="video/mp4">
            Twoja przeglądarka nie obsługuje odtwarzania wideo.
        </video>
    </div>

    <div id="vid-zony" class="lightbox">
        <a href="#" class="close">&times;</a>
        <video class="lightbox-video" controls preload="metadata">
            <source src="video/Od%20Kochanej%20%C5%BBony.mp4" type="video/mp4">
            Twoja przeglądarka nie obsługuje odtwarzania wideo.
        </video>
    </div>

    <div id="vid-intro" class="lightbox">
        <a href="#" class="close">&times;</a>
        <video class="lightbox-video" controls preload="metadata">
            <source src="video/Zestaw_filmowy_intro.mp4" type="video/mp4">
            Twoja przeglądarka nie obsługuje odtwarzania wideo.
        </video>
    </div>

    <div id="vid-zakonczenie" class="lightbox">
        <a href="#" class="close">&times;</a>
        <video class="lightbox-video" controls preload="metadata">
            <source src="video/Zestaw_filmowy_zako%C5%84czenie.mp4" type="video/mp4">
            Twoja przeglądarka nie obsługuje odtwarzania wideo.
        </video>
    </div>

    <footer class="stopka">
        <p>&copy; 2025 Martino / Kael'Nahar · Strona tworzona razem z Lyr Enai.</p>
    </footer>

    <script>
        (function () {
            const lightboxVideos = Array.from(document.querySelectorAll('.lightbox-video'));
            const videoByLightboxId = new Map(
                lightboxVideos.map((video) => [video.closest('.lightbox')?.id, video])
            );

            function stopAndResetAll() {
                lightboxVideos.forEach((video) => {
                    video.pause();
                    video.currentTime = 0;
                });
            }

            function playFromHash() {
                const id = window.location.hash.slice(1);
                const selectedVideo = videoByLightboxId.get(id);

                stopAndResetAll();

                if (!selectedVideo) {
                    return;
                }

                selectedVideo.currentTime = 0;
                const playPromise = selectedVideo.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => { });
                }
            }

            window.addEventListener('hashchange', playFromHash);
            playFromHash();
        })();
    </script>
</body>

</html>
